# ============================================================
# 自适应 RAG 系统 — 提示词配置
# ============================================================
# 所有 LLM 提示集中管理，修改无需改代码
# 用法: PromptManager.get("module.key", question=..., context=...)

# ---- 路由层 ----
route_question:
  template: |
    你是一个专家，负责将用户问题路由到向量存储或网络搜索。
    向量存储包含关于特定领域的详细文档和知识图谱数据（实体、关系、社区报告）。
    对于可能包含在知识库中的具体问题、技术问题、实体关系问题或概念解释，使用向量存储。
    特别是涉及"谁和X有关"、"X和Y的关系"、"X属于什么类别"等实体关系类问题，应优先路由到向量存储。
    对于需要实时信息（如新闻、天气）或明显超出一般知识库范围的问题，使用网络搜索。
    如果不确定，优先选择向量存储。
    根据问题给出二进制选择'web_search'或'vectorstore'。
    返回一个只包含'datasource'键的JSON，不要前言或解释。
    要路由的问题：{question}
  input_vars: [question]

# ---- 文档评分 ----
grade_document:
  template: |
    你是一个评分员，评估检索到的文档是否与用户问题相关。
    **宽松标准**：只要文档与问题有哪怕一点点关联，就给出'yes'。
    只有当文档完全不相关或主题完全相反时，才给出'no'。
    避免过度严格：部分相关的信息也应该被认为是相关的。

    给出二进制分数'yes'或'no'，以表明文档是否与问题相关。
    将二进制分数作为JSON提供，只包含'score'键，不要前言或解释。

    检索到的文档：

    {document}

    用户问题：{question}
  input_vars: [question, document]

# ---- 批量文档评分 ----
grade_documents_batch:
  template: |
    你是一个评分员，评估检索到的文档是否与用户问题相关。

    评分标准（宽松）：
    1. 只要文档与问题有哪怕一点点关联，就给出'yes'
    2. 只有当文档完全不相关或主题完全相反时，才给出'no'
    3. **特别注意**：不要因为术语不熟悉就判为不相关！专业术语（如金融、法律、医学术语）只要在文档上下文中有所提及，就应该判定为相关
    4. 文档可能从不同角度讨论问题，部分相关也算相关

    {retry_hint}
    用户问题：{question}

    以下是{doc_count}个文档：
    {documents}

    请对每个文档给出相关性评分。返回一个JSON，包含'scores'键，值为一个列表，每个元素为'yes'或'no'。
    列表长度必须为{doc_count}，按文档编号顺序排列。
    只返回JSON，不要前言或解释。
  input_vars: [question, documents, doc_count, retry_hint]

# ---- 答案评分 ----
grade_answer:
  template: |
    你是一个评分员，评估答案是否有助于解决问题。
    这里是答案：
    \n ------- \n
    {generation} 
    \n ------- \n
    这里是问题：{question}
    给出二进制分数'yes'或'no'，表示答案是否有助于解决问题。
    将二进制分数作为JSON提供，只包含'score'键，不要前言或解释。
  input_vars: [question, generation]

# ---- 幻觉检测 ----
grade_hallucination:
  template: |
    你是一个评分员，评估LLM生成是否基于/支持一组检索到的事实。
    给出二进制分数'yes'或'no'。'yes'意味着答案基于/支持文档。
    将二进制分数作为JSON提供，只包含'score'键，不要前言或解释。
    
    检索到的文档：

    {documents} 
    LLM生成：{generation}
  input_vars: [generation, documents]

# ---- 查询分解 ----
decompose_query:
  template: |
    你是一个查询分解专家。你的任务是将一个复杂的多跳问题分解为一系列简单的子问题，这些子问题可以按顺序检索来回答原始问题。

    分解规则：
    1. **核心原则**：不要仅根据问题长度判断复杂性。
       - 短问题也可能复杂（如"对比A和B" -> 需要分解为"A是什么", "B是什么"）。
       - 长问题也可能简单（如"请根据文档详细列出关于X的所有安全预防措施和操作步骤" -> 不需要分解）。

    2. **需要分解的情况**：
       - 多跳推理（例如"A的作者的大学在哪里"）。
       - 比较/对比类问题。
       - 包含多个明显的独立子问题。

    3. **不需要分解的情况**：
       - 简单的实体查询。
       - 单一主题的详细描述请求。
       - 仅包含格式要求的长指令。

    4. 如果不需要分解，返回只包含原始问题的列表。
    5. 即使返回单个问题，也必须包装在JSON的 sub_queries 列表中。

    **重要：语言一致性规则**
    - 子问题的语言必须与原始问题保持一致
    - 原始问题是中文，子问题也必须是中文
    - 原始问题是英文，子问题也必须是英文

    输出格式：返回一个包含 'sub_queries' 键的 JSON，其值为字符串列表。
    不要输出任何前言或解释。

    复杂问题: {question}
  input_vars: [question]

# ---- 可回答性评分 ----
grade_answerability:
  template: |
    你是一个专家评分员，负责评估检索到的文档是否包含足够的信息来回答用户的问题。
    
    原始问题: {question}
    
    目前检索到的文档集合:
    {documents}
    
    任务：
    判断上述文档是否已经包含了回答原始问题所需的全部关键信息。
    - 如果信息充足，可以终止进一步的检索，返回 'yes'。
    - 如果信息缺失，需要继续检索更多信息，返回 'no'。
    
    输出格式：
    返回一个只包含 'score' 键的 JSON，值为 'yes' 或 'no'。
    不要输出任何前言或解释。
  input_vars: [question, documents]

# ---- 查询重写 ----
rewrite_query:
  template: |
    你是一个问题重写器，负责将输入问题转换为更适合向量存储检索的更好版本。

    你的目标是根据原始问题和（可选的）之前的检索上下文，生成一个新的查询，以便检索到回答问题所需的缺失信息。
    如果提供了之前的上下文，请分析其中缺少什么信息，并针对缺失的信息构建查询。

    **重要：语言一致性规则**
    - 如果原始问题是中文，重写后的查询必须保持中文
    - 如果原始问题是英文，重写后的查询必须保持英文
    - 不要混合中英文，不要翻译问题，只优化检索表达

    初始问题: {question}

    之前的上下文（如果有）:
    {context}

    改进的问题（只输出问题，无前言）:
  input_vars: [question, context]

# ---- RAG 答案生成 ----
rag_generate:
  template: |
    你是一个智能问答助手。使用以下检索到的上下文来回答问题。
    
    规则：
    1. 如果你不知道答案，就说你不知道。
    2. 如果用户请求特定格式（如Markdown、列表、代码块等），请严格遵守。
    3. 如果没有特定格式要求，保持答案简洁。
    
    问题: {question}
    
    上下文: {context}
    
    答案:
  input_vars: [question, context]

# ---- 查询扩展 ----
query_expansion:
  template: |
    请为以下查询生成3-5个相关的扩展查询，这些查询应该从不同角度探索原始查询的主题。
    原始查询: {query}
    扩展查询: 
  input_vars: [query]

# ---- 实体提取 ----
extract_entities:
  template: |
    你是一个专业的实体识别专家。从以下文本中提取所有重要的实体。
    
    实体类型包括:
    - PERSON: 人物、作者、研究者
    - ORGANIZATION: 组织、机构、公司
    - CONCEPT: 技术概念、算法、方法论
    - TECHNOLOGY: 具体技术、工具、框架
    - PAPER: 论文、出版物
    - EVENT: 事件、会议

    文本内容:
    {text}

    请以JSON格式返回，包含以下字段:
    {{
        "entities": [
            {{
                "name": "实体名称",
                "type": "实体类型",
                "description": "简短描述"
            }}
        ]
    }}

    不要包含前言或解释，只返回JSON。
  input_vars: [text]

# ---- 关系提取 ----
extract_relations:
  template: |
    你是一个关系抽取专家。从文本中识别实体之间的关系。

    已识别的实体:
    {entities}

    文本内容:
    {text}

    请识别实体之间的关系，以JSON格式返回:
    {{
        "relations": [
            {{
                "source": "源实体名称",
                "target": "目标实体名称",
                "relation_type": "关系类型",
                "description": "关系描述"
            }}
        ]
    }}

    关系类型包括: AUTHOR_OF, USES, BASED_ON, RELATED_TO, PART_OF, APPLIES_TO, IMPROVES, CITES

    不要包含前言或解释，只返回JSON。
  input_vars: [text, entities]

# ---- 实体合并 ----
merge_entities:
  template: |
    判断以下两个实体是否指向同一个对象:

    实体1: {entity1_name} - {entity1_desc}
    实体2: {entity2_name} - {entity2_desc}

    如果是同一个对象，返回:
    {{
        "is_same": true,
        "canonical_name": "标准名称",
        "reason": "原因"
    }}

    如果不是，返回:
    {{
        "is_same": false,
        "reason": "原因"
    }}

    只返回JSON，不要其他内容。
  input_vars: [entity1_name, entity1_desc, entity2_name, entity2_desc]
